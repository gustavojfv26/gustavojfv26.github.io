<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Populção das Cidades </title>
    <style>
        table{
            border: 2px double black;
            border-collapse: collapse;
            
        }
        th{
            border: 2px double black;
            background-color: rgb(18, 48, 105);
            text-align: center;
            color:rgb(184, 207, 228);
             
        }
        td{
            border: 2px double black;
            background-color: rgb(32, 82, 175);
            color:rgb(184, 207, 228);
            
            
            
         
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Estado</th>
            <th>Cidade</th>
            <th>População</th>
        </tr>
        <tr>
            <td rowspan="3">Santa Catarina</td>
            <td>Joinville</td>
            <td>664.500</td>
        </tr>
        <tr>
            <td>Florianópolis</td>
            <td>587.486</td>
        </tr>
        <tr>
            <td>Jaraguá do Sul</td>
            <td>182.660</td>
        </tr>
        <tr>
            <td rowspan="2">Paraná</td>
            <td>Curitiba</td>
            <td>1.830.795</td>
        </tr>
        <tr>
            <td>Ponta Grossa</td>
            <td>375.632</td>
        </tr>
        <tr>
            <td colspan="2" style="background-color: rgb(18, 48, 105);">Total</td>
            <td>3.641.073</td>
        </tr>
    </table>
</body>
</html>
